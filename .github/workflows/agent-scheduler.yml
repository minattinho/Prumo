name: agent-scheduler
on:
  schedule:
    - cron: "0 8 * * *"    # Todo dia as 8h UTC (5h BRT)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  schedule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r ai/scripts/requirements.txt

      - name: Run scheduler
        run: python ai/scripts/agent_scheduler.py
        env:
          LLM_PROVIDER: openrouter
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_MODEL: qwen/qwen3.6-plus:free
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

      - name: Commit changes
        run: |
          git config user.name "prumo-bot"
          git config user.email "bot@prumo.com"
          git add ai/content/instagram/
          git commit -m "feat(ai): scheduler atualizou conteudo [skip ci]" || true
          git push
